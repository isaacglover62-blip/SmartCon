spring:
  application:
    name: smarthome-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smarthome}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:fallback-dev-secret-min-32-chars-long-enough}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.smarthome: INFO
    org.springframework.security: WARN
